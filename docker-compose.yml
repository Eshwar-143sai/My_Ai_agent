version: '3.8'

services:
  agent_api:
    build: .
    container_name: ai_agent_api
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/app/chroma_data
      - .:/app
    env_file:
      - .env
    depends_on:
      redis_cache:
        condition: service_healthy
    restart: unless-stopped

  redis_cache:
    image: redis:alpine
    container_name: ai_redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
